spring.application.name=taxi-booking

# ── PostgreSQL DataSource ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/taxi_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── SQL seed data (runs on startup if tables are empty) ───────────
spring.sql.init.mode=never
# Set to 'always' the first time to seed data, then change to 'never'
# spring.sql.init.mode=always
# spring.sql.init.data-locations=classpath:data.sql

# ── Server ────────────────────────────────────────────────────────
server.port=8080

# ── CORS ──────────────────────────────────────────────────────────
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
